  <div class="background"></div>




  <section id="portfolio" class="portfolio">
    <h2>Services</h2>

    <div class="grid-ser">
        <img src="images/nailchart.png" alt="Nail Chart">
    </div>
  </section>

 <section id="book" class="booking">

  <div class="booking-layout">

    <div class="work">
      <img src="images/elianawork.svg" alt="Eliana">
    </div>

    <div class="booking-form">
      <h2>Book</h2>

      <input type="text" id="clientName" placeholder="Name">

      <input type="tel" id="clientPhone" placeholder="Phone">

      <input type="text" id="appointmentDate" placeholder="Select Date">

      <div id="timeSlots" class="time-slots"></div>

      <select id="serviceSelect">
        <option value="">Service</option>
        <option>Manicure</option>
        <option>Pedicure</option>
      </select>

      <select id="polishSelect">
        <option value="">Polish</option>
        <option>Gel</option>
        <option>Acrylic</option>
      </select>

      <select id="designSelect">
        <option value="">Design</option>
        <option>Basic</option>
        <option>Minimal Design</option>
        <option>Max Design</option>
      </select>

      <button onclick="bookAppointment()">Book Appointment</button>

      <p id="message"></p>
    </div>

  </div>

  <div id="bookingPopup" class="popup">
    <div class="popup-box">
      <h2>Appointment Booked!</h2>
      <p>Your appointment has been successfully scheduled.</p>
      <button onclick="closePopup()">OK</button>
    </div>
  </div>

</section>
